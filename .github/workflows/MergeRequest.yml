name: Merge Request
on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build_n_test:
    name: Build and check tag
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Tag check
        run: |
          ORIGINAL_CODE_TAG=$(<version) && echo "Code tag is: $ORIGINAL_CODE_TAG"
          [[ $ORIGINAL_CODE_TAG =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || (echo $'unsuitable tag for deployment: regex \'^[0-9]+\.[0-9]+\.[0-9]+$\' was not respected'; exit 99)
          CODE_TAG="v${ORIGINAL_CODE_TAG}"
          echo "CODE_TAG=$CODE_TAG" >> $GITHUB_ENV
          git ls-remote --tags origin "refs/tags/$CODE_TAG" | grep -q "$CODE_TAG" && echo "ERROR: THIS TAG ALREADY EXISTS WITHIN THE REPO! EXITING" && exit 99
          echo " ==> TAGS: Checks ok!"
          echo "ORIGINAL_CODE_TAG=$ORIGINAL_CODE_TAG" >> $GITHUB_ENV

      - name: Build LaTeX document
        uses: xu-cheng/latex-action@e2f99d4b3685b0da93f97e1b86ad8fab81105098 # v3.3.0
        with:
          root_file: "cv.tex"
          latexmk_use_xelatex: true
          post_compile: "cp cv.pdf CV_Orzes_Matteo.pdf"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cv-pdf-test
          path: CV_Orzes_Matteo.pdf
          if-no-files-found: error